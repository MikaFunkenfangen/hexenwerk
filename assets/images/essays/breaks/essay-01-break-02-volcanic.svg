<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bas" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3a2e26"/>
      <stop offset="50%" stop-color="#302620"/>
      <stop offset="100%" stop-color="#181310"/>
    </linearGradient>
    <radialGradient id="heat" cx="30%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#d4a031" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#181310" stop-opacity="0"/>
    </radialGradient>
    <filter id="basalt">
      <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4"/>
      <feColorMatrix values="0 0 0 0 0.24  0 0 0 0 0.18  0 0 0 0 0.14  0 0 0 0.25 0"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bas)"/>
  <rect width="1920" height="1080" fill="url(#heat)"/>
  <rect width="1920" height="1080" filter="url(#basalt)" opacity="0.5"/>
</svg>
