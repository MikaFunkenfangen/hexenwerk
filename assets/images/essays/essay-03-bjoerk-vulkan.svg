<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="volcanic" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a3a30"/>
      <stop offset="40%" stop-color="#3a2e26"/>
      <stop offset="80%" stop-color="#241c18"/>
      <stop offset="100%" stop-color="#14100e"/>
    </linearGradient>
    <radialGradient id="emberglow" cx="60%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#d4a031" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#8a6620" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#14100e" stop-opacity="0"/>
    </radialGradient>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3"/>
      <feColorMatrix values="0 0 0 0 0.28  0 0 0 0 0.2  0 0 0 0 0.14  0 0 0 0.2 0"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#volcanic)"/>
  <rect width="1920" height="1080" fill="url(#emberglow)"/>
  <rect width="1920" height="1080" filter="url(#rough)" opacity="0.5"/>
</svg>
