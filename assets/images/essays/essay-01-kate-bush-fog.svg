<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fog" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6a7770"/>
      <stop offset="40%" stop-color="#4a564f"/>
      <stop offset="80%" stop-color="#2a3830"/>
      <stop offset="100%" stop-color="#141c17"/>
    </linearGradient>
    <radialGradient id="light" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#8a9a92" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#141c17" stop-opacity="0"/>
    </radialGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2"/>
      <feColorMatrix values="0 0 0 0 0.2  0 0 0 0 0.22  0 0 0 0 0.2  0 0 0 0.12 0"/>
    </filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#fog)"/>
  <rect width="1920" height="1080" fill="url(#light)"/>
  <rect width="1920" height="1080" filter="url(#noise)" opacity="0.5"/>
</svg>
