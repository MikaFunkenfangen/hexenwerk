<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000">
  <defs>
    <clipPath id="arch">
      <path d="M200,960 L200,340 Q200,90 400,40 Q600,90 600,340 L600,960 Z"/>
    </clipPath>
  </defs>

  <g clip-path="url(#arch)">
    <!-- Colored glass panes — intentionally saturated, CSS mask controls visibility -->

    <!-- Upper arch fill - rich gold -->
    <path d="M200,340 Q200,90 400,40 Q600,90 600,340 L400,340 Z" fill="rgba(212,160,49,0.25)"/>

    <!-- Panel fills -->
    <rect x="200" y="340" width="200" height="210" fill="rgba(120,30,50,0.18)"/>
    <rect x="400" y="340" width="200" height="210" fill="rgba(184,134,11,0.16)"/>
    <rect x="200" y="550" width="200" height="200" fill="rgba(184,134,11,0.12)"/>
    <rect x="400" y="550" width="200" height="200" fill="rgba(120,30,50,0.12)"/>
    <rect x="200" y="750" width="200" height="210" fill="rgba(120,30,50,0.08)"/>
    <rect x="400" y="750" width="200" height="210" fill="rgba(184,134,11,0.08)"/>

    <!-- Main gothic arch frame -->
    <path d="M200,960 L200,340 Q200,90 400,40 Q600,90 600,340 L600,960 Z"
          fill="none" stroke="rgba(212,160,49,0.7)" stroke-width="3"/>

    <!-- Central mullion -->
    <line x1="400" y1="40" x2="400" y2="960" stroke="rgba(212,160,49,0.55)" stroke-width="2.5"/>

    <!-- Transoms -->
    <line x1="200" y1="340" x2="600" y2="340" stroke="rgba(212,160,49,0.5)" stroke-width="2"/>
    <line x1="200" y1="550" x2="600" y2="550" stroke="rgba(212,160,49,0.4)" stroke-width="2"/>
    <line x1="200" y1="750" x2="600" y2="750" stroke="rgba(212,160,49,0.35)" stroke-width="1.5"/>

    <!-- ===== ROSE WINDOW ===== -->
    <circle cx="400" cy="200" r="120" fill="none" stroke="rgba(212,160,49,0.65)" stroke-width="2.5"/>
    <circle cx="400" cy="200" r="90" fill="none" stroke="rgba(212,160,49,0.5)" stroke-width="2"/>
    <circle cx="400" cy="200" r="60" fill="none" stroke="rgba(212,160,49,0.45)" stroke-width="1.5"/>
    <circle cx="400" cy="200" r="30" fill="rgba(212,160,49,0.2)" stroke="rgba(212,160,49,0.4)" stroke-width="1"/>
    <circle cx="400" cy="200" r="12" fill="rgba(212,160,49,0.35)"/>

    <!-- Rose spokes -->
    <g transform="translate(400,200)" stroke="rgba(212,160,49,0.4)" stroke-width="1.2">
      <line x1="0" y1="-120" x2="0" y2="120"/>
      <line x1="-120" y1="0" x2="120" y2="0"/>
      <line x1="-85" y1="-85" x2="85" y2="85"/>
      <line x1="85" y1="-85" x2="-85" y2="85"/>
    </g>
    <g transform="translate(400,200)" stroke="rgba(184,134,11,0.3)" stroke-width="0.8">
      <line x1="-46" y1="-111" x2="46" y2="111"/>
      <line x1="46" y1="-111" x2="-46" y2="111"/>
      <line x1="-111" y1="-46" x2="111" y2="46"/>
      <line x1="-111" y1="46" x2="111" y2="-46"/>
    </g>

    <!-- Rose petal fills (between spokes) -->
    <ellipse cx="400" cy="140" rx="20" ry="35" fill="rgba(120,30,50,0.15)"/>
    <ellipse cx="400" cy="260" rx="20" ry="35" fill="rgba(184,134,11,0.12)"/>
    <ellipse cx="340" cy="200" rx="35" ry="20" fill="rgba(120,30,50,0.12)"/>
    <ellipse cx="460" cy="200" rx="35" ry="20" fill="rgba(184,134,11,0.15)"/>

    <!-- ===== TREFOILS in upper panels ===== -->
    <circle cx="300" cy="460" r="55" fill="none" stroke="rgba(212,160,49,0.4)" stroke-width="1.5"/>
    <circle cx="276" cy="435" r="24" fill="rgba(120,30,50,0.2)" stroke="rgba(212,160,49,0.2)" stroke-width="0.5"/>
    <circle cx="324" cy="435" r="24" fill="rgba(184,134,11,0.18)" stroke="rgba(212,160,49,0.2)" stroke-width="0.5"/>
    <circle cx="300" cy="480" r="24" fill="rgba(160,120,40,0.15)" stroke="rgba(212,160,49,0.2)" stroke-width="0.5"/>

    <circle cx="500" cy="460" r="55" fill="none" stroke="rgba(212,160,49,0.4)" stroke-width="1.5"/>
    <circle cx="476" cy="435" r="24" fill="rgba(184,134,11,0.18)" stroke="rgba(212,160,49,0.2)" stroke-width="0.5"/>
    <circle cx="524" cy="435" r="24" fill="rgba(120,30,50,0.2)" stroke="rgba(212,160,49,0.2)" stroke-width="0.5"/>
    <circle cx="500" cy="480" r="24" fill="rgba(160,120,40,0.15)" stroke="rgba(212,160,49,0.2)" stroke-width="0.5"/>

    <!-- ===== DIAMONDS in middle panels ===== -->
    <rect x="272" y="617" width="56" height="56" transform="rotate(45,300,645)" fill="rgba(184,134,11,0.15)" stroke="rgba(212,160,49,0.35)" stroke-width="1"/>
    <rect x="472" y="617" width="56" height="56" transform="rotate(45,500,645)" fill="rgba(120,30,50,0.15)" stroke="rgba(212,160,49,0.35)" stroke-width="1"/>

    <!-- Lower diamonds -->
    <rect x="272" y="820" width="56" height="56" transform="rotate(45,300,848)" fill="rgba(160,120,40,0.1)" stroke="rgba(212,160,49,0.25)" stroke-width="0.8"/>
    <rect x="472" y="820" width="56" height="56" transform="rotate(45,500,848)" fill="rgba(120,30,50,0.1)" stroke="rgba(212,160,49,0.25)" stroke-width="0.8"/>

    <!-- Small accent circles in lower panels -->
    <circle cx="300" cy="848" r="15" fill="rgba(212,160,49,0.08)" stroke="rgba(212,160,49,0.2)" stroke-width="0.5"/>
    <circle cx="500" cy="848" r="15" fill="rgba(120,30,50,0.08)" stroke="rgba(212,160,49,0.2)" stroke-width="0.5"/>
  </g>

  <!-- Outer decorative frame -->
  <path d="M186,960 L186,335 Q186,80 400,28 Q614,80 614,335 L614,960 Z"
        fill="none" stroke="rgba(212,160,49,0.3)" stroke-width="1"/>
</svg>
